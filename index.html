<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-react-ts</title>

    <!--
      Set the theme before first paint to avoid a flash of the wrong theme.
      Reads the saved preference. Writes the *resolved* theme so CSS [data-theme="dark"]
      matches what React will apply on mount.
    -->
    <script>
        (function () {
            try {
                var pref = localStorage.getItem("theme");
                var dark = pref === "dark" || ((pref === "auto" || !pref) && window.matchMedia("(prefers-color-scheme: dark)").matches);
                document.documentElement.setAttribute(
                    "data-theme",
                    dark ? "dark" : "light"
                );
            } catch (e) {
                /* no-op: fall back to CSS media-query defaults */
            }
        })();
    </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
